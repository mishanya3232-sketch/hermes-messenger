<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:* http://127.0.0.1:* http://185.244.40.184:* ws://localhost:* ws://127.0.0.1:* ws://185.244.40.184:* https://*.github.io; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';">
    <title>Hermes Messenger MVP</title>
    <link rel="stylesheet" href="style.css?v=20260619-push">
</head>
<body>
    <main class="app hidden" id="mainApp">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div>
                    <h1>Hermes Messenger</h1>
                    <p id="currentUserLine">Вход через backend</p>
                </div>
                <button id="logoutBtn" class="ghost small" type="button">Выйти</button>
                <button id="adminAccessBtn" class="ghost small hidden" type="button" title="Доступ пользователей">Доступ</button>
            </header>

            <div id="connectionStatus" class="connection-status offline">backend: вход</div>
            <button id="notificationButton" class="ghost small notification-button" type="button">Уведомления</button>
            <p id="notificationStatus" class="notification-status muted">Уведомления выключены</p>

            <label class="search">
                <span>Поиск</span>
                <input id="chatSearch" type="search" placeholder="Чат, группа, канал" maxlength="80">
            </label>

            <section id="adminPanel" class="admin-panel hidden" aria-label="Управление доступом">
                <h3>Доступ пользователей</h3>
                <div id="adminUsersList"></div>
            </section>

            <nav id="chatList" class="chat-list" aria-label="Список чатов"></nav>
        </aside>

        <section class="chat-panel">
            <header class="chat-header">
                <div class="chat-title-wrap">
                    <button id="mobileBackBtn" class="mobile-back-btn hidden" type="button" aria-label="Назад к списку чатов">←</button>
                    <div id="chatAvatar" class="avatar big"></div>
                    <div>
                        <h2 id="chatTitle">Чат</h2>
                        <p id="chatSubtitle"></p>
                    </div>
                </div>
                <div id="chatActions" class="chat-actions"></div>
            </header>

            <div id="messageList" class="message-list" aria-live="polite"></div>

            <div id="botHelp" class="bot-help hidden"></div>

            <form id="composer" class="composer">
                <input id="messageInput" type="text" autocomplete="off" placeholder="Напишите сообщение..." maxlength="1000">
                <input id="fileInput" class="hidden" type="file">
                <button id="attachButton" class="ghost small" type="button" title="Прикрепить файл">Файл</button>
                <button class="primary" type="submit">Отправить</button>
            </form>
        </section>
    </main>

    <section id="authScreen" class="auth-screen">
        <div class="auth-card">
            <div>
                <h1>Hermes Messenger</h1>
                <p>Вход и регистрация через backend. Токены Hermes остаются на сервере.</p>
            </div>

            <div class="auth-tabs" role="tablist">
                <button id="loginTabBtn" class="auth-tab active" type="button">Вход</button>
                <button id="registerTabBtn" class="auth-tab" type="button">Регистрация</button>
            </div>

            <form id="authForm" class="auth-form">
                <label class="auth-field">
                    <span>Имя</span>
                    <input id="authNameInput" type="text" autocomplete="name" placeholder="Михаил" maxlength="40">
                </label>

                <label class="auth-field">
                    <span>Логин</span>
                    <input id="authUsernameInput" type="text" autocomplete="username" placeholder="mikhail" maxlength="32">
                </label>

                <label class="auth-field">
                    <span>Пароль</span>
                    <input id="authPasswordInput" type="password" autocomplete="current-password" placeholder="Минимум 4 символа" maxlength="64">
                </label>

                <label class="auth-field hidden" id="authPasswordConfirmField">
                    <span>Повторите пароль</span>
                    <input id="authPasswordConfirmInput" type="password" autocomplete="new-password" placeholder="Повторите пароль" maxlength="64">
                </label>

                <p id="authError" class="auth-error" role="alert"></p>

                <button id="authSubmitBtn" class="primary" type="submit">Войти</button>
            </form>

            <p id="authPendingInfo" class="auth-pending hidden" role="status"></p>
            <p class="auth-hint">Новые аккаунты создаются через backend и ждут подтверждения администратора @mikhail.</p>
        </div>
    </section>

    <script src="script.js?v=20260619-push"></script>
</body>
</html>
